<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RevisePro — OCR J277 GCSE Computer Science</title>
<style>
/* ============== THEME ============== */
:root{
--bg:#07070d; --bg-2:#0d0d1a; --panel:rgba(20,20,38,.6); --panel-2:rgba(30,30,55,.55);
--border:rgba(120,120,255,.18); --text:#e7e9ff; --muted:#8a8db0;
--neon:#00f0ff; --neon-2:#ff2bd6; --neon-3:#7c5cff; --good:#27f59a; --bad:#ff4d6d; --warn:#ffb020;
--shadow:0 8px 40px rgba(0,240,255,.08);
}
html.light{
--bg:#f4f5fb; --bg-2:#e9ebf6; --panel:rgba(255,255,255,.7); --panel-2:rgba(255,255,255,.85);
--border:rgba(60,60,120,.15); --text:#0d0f24; --muted:#5a5f7a;
--neon:#0078ff; --neon-2:#c4009b; --neon-3:#5236d6; --shadow:0 8px 30px rgba(80,80,160,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden}
body{min-height:100vh;background:
radial-gradient(1200px 600px at 10% -10%, rgba(124,92,255,.25), transparent 60%),
radial-gradient(1000px 500px at 110% 10%, rgba(255,43,214,.18), transparent 60%),
radial-gradient(800px 400px at 50% 120%, rgba(0,240,255,.15), transparent 60%),
var(--bg);
}
/* animated grid bg */
.bg-grid{position:fixed;inset:0;z-index:-1;background-image:
linear-gradient(rgba(124,92,255,.07) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,240,255,.06) 1px,transparent 1px);
background-size:48px 48px;mask-image:radial-gradient(ellipse at center,#000 30%,transparent 80%);animation:drift 20s linear infinite}
@keyframes drift{from{background-position:0 0,0 0}to{background-position:480px 480px,480px 480px}}

/* ============== LAYOUT ============== */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
aside.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,rgba(15,15,35,.85),rgba(10,10,25,.7));backdrop-filter:blur(14px);border-right:1px solid var(--border);padding:22px 16px;display:flex;flex-direction:column;gap:8px;z-index:50}
html.light aside.sidebar{background:linear-gradient(180deg,rgba(255,255,255,.85),rgba(245,245,255,.75))}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:22px;letter-spacing:1px;margin-bottom:18px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:conic-gradient(from 0deg,var(--neon),var(--neon-2),var(--neon-3),var(--neon));box-shadow:0 0 20px var(--neon);position:relative}
.logo-mark::after{content:"R";position:absolute;inset:0;display:grid;place-items:center;color:#000;font-weight:900}
.logo span b{background:linear-gradient(90deg,var(--neon),var(--neon-2));-webkit-background-clip:text;color:transparent}
.nav-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--muted);border:1px solid transparent;transition:all .2s;font-size:14px;font-weight:600}
.nav-btn:hover{color:var(--text);background:rgba(124,92,255,.08);border-color:var(--border)}
.nav-btn.active{color:var(--text);background:linear-gradient(90deg,rgba(0,240,255,.15),rgba(255,43,214,.1));border-color:var(--neon);box-shadow:inset 0 0 12px rgba(0,240,255,.18)}
.nav-btn .ico{width:20px;text-align:center}
.sidebar-foot{margin-top:auto;font-size:11px;color:var(--muted);text-align:center;opacity:.7}

main{padding:28px 36px 80px;min-width:0}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.topbar h1{margin:0;font-size:28px;letter-spacing:.3px}
.topbar h1 small{color:var(--muted);font-weight:400;font-size:13px;display:block;margin-top:4px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:var(--panel);border:1px solid var(--border);font-size:12px;font-weight:700}
.chip.xp{color:var(--neon)}
.chip.streak{color:var(--warn)}
.chip.level{color:var(--neon-2)}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer;font-size:16px;display:grid;place-items:center}
.icon-btn:hover{border-color:var(--neon);color:var(--neon);box-shadow:0 0 12px rgba(0,240,255,.3)}

/* ============== CARDS ============== */
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(14px);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
.stat{position:relative;overflow:hidden}
.stat .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
.stat .value{font-size:32px;font-weight:800;margin-top:6px;background:linear-gradient(90deg,var(--neon),var(--neon-2));-webkit-background-clip:text;color:transparent}
.stat .sub{color:var(--muted);font-size:12px;margin-top:4px}
.progress{height:8px;background:rgba(120,120,255,.15);border-radius:999px;overflow:hidden;margin-top:10px}
.progress .bar{height:100%;background:linear-gradient(90deg,var(--neon),var(--neon-2));border-radius:999px;box-shadow:0 0 12px var(--neon);transition:width .6s}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1px solid var(--neon);background:linear-gradient(90deg,rgba(0,240,255,.15),rgba(255,43,214,.15));color:var(--text);font-weight:700;cursor:pointer;font-size:14px;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,240,255,.25)}
.btn.ghost{background:transparent;border-color:var(--border);color:var(--muted)}
.btn.ghost:hover{color:var(--text);border-color:var(--neon)}
.btn.good{border-color:var(--good);background:rgba(39,245,154,.12);color:var(--good)}
.btn.bad{border-color:var(--bad);background:rgba(255,77,109,.12);color:var(--bad)}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap}
.tab{padding:10px 16px;cursor:pointer;color:var(--muted);font-weight:600;border-bottom:2px solid transparent;font-size:14px}
.tab.active{color:var(--neon);border-color:var(--neon)}

.topic-card{cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.topic-card:hover{transform:translateY(-3px);border-color:var(--neon);box-shadow:0 12px 30px rgba(0,240,255,.2)}
.topic-card h3{margin:0 0 6px;font-size:16px}
.topic-card .meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(124,92,255,.2);color:var(--neon-3);text-transform:uppercase;letter-spacing:.5px}
.badge.done{background:rgba(39,245,154,.15);color:var(--good)}

/* Flashcard */
.flash-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 0}
.flashcard{width:min(520px,100%);height:280px;perspective:1200px;cursor:pointer}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .7s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;border-radius:18px;padding:30px;display:grid;place-items:center;text-align:center;backface-visibility:hidden;border:1px solid var(--border);background:linear-gradient(135deg,rgba(0,240,255,.1),rgba(124,92,255,.12));box-shadow:0 12px 40px rgba(0,240,255,.15)}
.flashcard-face.back{transform:rotateY(180deg);background:linear-gradient(135deg,rgba(255,43,214,.12),rgba(124,92,255,.12))}
.flashcard-face .q{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.flashcard-face .t{font-size:20px;font-weight:600;line-height:1.4}
.flash-controls{display:flex;gap:10px;align-items:center}

/* Quiz */
.quiz-q{font-size:18px;font-weight:600;margin-bottom:14px;line-height:1.4}
.choice{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);cursor:pointer;margin-bottom:10px;transition:all .2s;font-size:14px}
.choice:hover{border-color:var(--neon);transform:translateX(4px)}
.choice.correct{border-color:var(--good);background:rgba(39,245,154,.15);animation:popIn .4s}
.choice.wrong{border-color:var(--bad);background:rgba(255,77,109,.15);animation:shake .4s}
.choice.disabled{cursor:default;opacity:.6}
@keyframes popIn{0%{transform:scale(.95)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.explain{margin-top:12px;padding:12px;border-radius:8px;background:rgba(124,92,255,.1);border-left:3px solid var(--neon-3);font-size:13px;color:var(--muted)}

/* Exam */
.exam-q{padding:16px;border-radius:12px;background:var(--panel-2);border:1px solid var(--border);margin-bottom:14px}
.exam-q .marks{float:right;background:var(--neon-3);color:#fff;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700}
.exam-q textarea{width:100%;min-height:90px;margin-top:10px;padding:10px;border-radius:8px;background:var(--bg-2);color:var(--text);border:1px solid var(--border);font-family:inherit;resize:vertical}
.exam-q .model{display:none;margin-top:10px;padding:12px;border-radius:8px;background:rgba(39,245,154,.08);border-left:3px solid var(--good);font-size:13px;white-space:pre-wrap}
.exam-q.show .model{display:block}

/* Notes */
.notes h3{color:var(--neon);margin-top:18px}
.notes p,.notes li{line-height:1.65;color:var(--text)}
.notes .tip{padding:12px;border-radius:8px;background:rgba(255,176,32,.1);border-left:3px solid var(--warn);margin:12px 0;font-size:14px}
.notes .danger{padding:12px;border-radius:8px;background:rgba(255,77,109,.1);border-left:3px solid var(--bad);margin:12px 0;font-size:14px}

/* Glossary */
.glossary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.term{padding:14px;border-radius:12px;background:var(--panel-2);border:1px solid var(--border)}
.term .name{font-weight:800;color:var(--neon);margin-bottom:4px}
.search{width:100%;padding:12px 16px;border-radius:10px;background:var(--panel);border:1px solid var(--border);color:var(--text);font-size:14px;margin-bottom:18px}
.search:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,240,255,.15)}

/* Achievements */
.ach{padding:18px;border-radius:14px;text-align:center;background:var(--panel-2);border:1px solid var(--border);transition:all .25s}
.ach.unlocked{border-color:var(--warn);background:linear-gradient(180deg,rgba(255,176,32,.15),rgba(255,43,214,.08));box-shadow:0 0 24px rgba(255,176,32,.25)}
.ach .em{font-size:40px}
.ach .nm{font-weight:700;margin-top:6px}
.ach .ds{font-size:11px;color:var(--muted);margin-top:4px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:12px;background:linear-gradient(90deg,var(--neon),var(--neon-2));color:#000;font-weight:700;z-index:200;box-shadow:0 10px 30px rgba(0,240,255,.4);animation:slideUp .4s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Mobile */
.menu-toggle{display:none}
@media(max-width:900px){
.app{grid-template-columns:1fr}
aside.sidebar{position:fixed;left:-280px;transition:left .3s;width:260px}
aside.sidebar.open{left:0}
main{padding:20px 16px 60px}
.menu-toggle{display:grid}
.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}
.grid.cols-2{grid-template-columns:1fr}
}

/* Topic list */
.subtopics{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:12px}
.sub-item{padding:12px 14px;border-radius:10px;background:var(--panel-2);border:1px solid var(--border);cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.sub-item:hover{border-color:var(--neon);color:var(--neon);transform:translateX(4px)}
.sub-item .check{color:var(--good);opacity:0}
.sub-item.done .check{opacity:1}

.crumbs{font-size:13px;color:var(--muted);margin-bottom:14px}
.crumbs a{color:var(--neon);cursor:pointer;text-decoration:none}
.crumbs a:hover{text-decoration:underline}

/* level ring */
.ring{position:relative;width:120px;height:120px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .lbl{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .lbl b{display:block;font-size:24px;background:linear-gradient(90deg,var(--neon),var(--neon-2));-webkit-background-clip:text;color:transparent}
.ring .lbl span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Enhancement UI */
.global-search{position:relative;flex:1;min-width:240px;max-width:560px}
.global-search input{width:100%;margin:0;padding:11px 42px 11px 40px;border-radius:12px;background:var(--panel);border:1px solid var(--border);color:var(--text);font:inherit;transition:.2s}
.global-search input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,240,255,.12)}
.global-search .sico{position:absolute;left:14px;top:11px;color:var(--neon)}
.search-results{display:none;position:absolute;top:48px;left:0;right:0;max-height:420px;overflow:auto;padding:8px;background:var(--bg-2);border:1px solid var(--border);border-radius:12px;box-shadow:0 20px 50px rgba(0,0,0,.45);z-index:150}
.search-results.open{display:block}.search-result{padding:11px;border-radius:9px;cursor:pointer;border:1px solid transparent}.search-result:hover{background:var(--panel-2);border-color:var(--neon)}
.search-result b{display:block;font-size:13px}.search-result small{display:block;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.result-type{float:right;color:var(--neon-2);font-size:10px;text-transform:uppercase;letter-spacing:.7px}
.accordion{margin:10px 0;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--panel-2)}
.accordion summary{padding:14px 16px;cursor:pointer;font-weight:700;color:var(--neon);list-style:none;display:flex;justify-content:space-between}.accordion summary::after{content:'＋';transition:.2s}.accordion[open] summary::after{transform:rotate(45deg)}.accordion-body{padding:0 16px 16px;border-top:1px solid var(--border)}
.compare-wrap{overflow-x:auto}.compare{width:100%;border-collapse:collapse;margin-top:12px}.compare th,.compare td{padding:11px;text-align:left;border:1px solid var(--border);vertical-align:top}.compare th{color:var(--neon);background:rgba(0,240,255,.07)}
.tool-card{min-height:190px;display:flex;flex-direction:column}.tool-card .tool-icon{font-size:30px}.tool-card p{color:var(--muted);font-size:13px;line-height:1.5;flex:1}.tool-stage{margin-top:18px;animation:popIn .3s}
.timer{font-size:42px;font-weight:900;color:var(--neon);font-variant-numeric:tabular-nums}.heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px}.heat-cell{padding:12px;border-radius:10px;border:1px solid var(--border);font-size:12px}.mastery{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}.medal{font-size:20px;float:right}
.exam-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.exam-guide{padding:10px;border-radius:8px;background:rgba(0,240,255,.06);font-size:12px;color:var(--muted)}
@media(max-width:900px){.topbar{align-items:stretch}.topbar>div:first-child{width:100%}.global-search{order:3;max-width:none;width:100%}.topbar-actions{width:100%;overflow-x:auto;padding-bottom:3px}.exam-meta{grid-template-columns:1fr}.flash-controls{flex-wrap:wrap;justify-content:center}}
</style>
</head>

<div class="bg-grid"></div>
<div class="app">
<aside class="sidebar" id="sidebar">
<div class="logo"><div class="logo-mark"></div><span>Revise<b>Pro</b></span></div>
<div class="nav-btn active" data-view="dashboard"><span class="ico">⌂</span> Dashboard</div>
<div class="nav-btn" data-view="topics"><span class="ico">▣</span> OCR J277 Topics</div>

<div class="nav-btn" data-view="quizzes"><span class="ico">◈</span> Quizzes</div>

<script>
/* ============================================================
DATA: OCR J277 SPEC — topics, notes, flashcards, quizzes, exam Qs
============================================================ */
const SPEC = {

/* Detailed notes / flashcards / quizzes / exam questions per subtopic.
Comprehensive set; default template fills for any sub not custom-written. */
const CONTENT = {
"CPU":{
notes:`<h3>Definition</h3><p>The <b>CPU (Central Processing Unit)</b> is the part of a computer that processes instructions. It executes programs by repeatedly carrying out the <b>fetch–decode–execute</b> cycle.</p>
<h3>Key Components</h3><ul><li><b>ALU</b> – performs arithmetic and logical operations.</li><li><b>CU (Control Unit)</b> – sends signals to coordinate the CPU.</li><li><b>Registers</b> – tiny, fast storage locations inside the CPU.</li><li><b>Cache</b> – fast memory between CPU and RAM.</li></ul>
<h3>Performance Factors</h3><ul><li><b>Clock speed</b> – cycles per second (Hz). Higher = faster.</li><li><b>Number of cores</b> – more cores allow parallel processing.</li><li><b>Cache size</b> – more cache reduces RAM trips.</li></ul>
<div class="tip">💡 Exam tip: When asked "how does X improve performance?", always link the change back to the FDE cycle — e.g. "more cache means fewer fetches from slower RAM, so more instructions per second."</div>
<div class="danger">⚠ Common mistake: Confusing clock speed (Hz) with RAM capacity (GB). They measure different things.</div>`,
flash:[["What does CPU stand for?","Central Processing Unit."],
["What three things does the CPU do each cycle?","Fetch, decode and execute instructions."],
["What is the ALU?","Arithmetic Logic Unit – performs arithmetic and logical operations."],
["What does the Control Unit do?","Sends control signals to coordinate the CPU's operations."],
["Name three factors affecting CPU performance.","Clock speed, number of cores, cache size."],
["What is a core?","An independent processing unit inside a CPU that can run its own FDE cycle."]],
quiz:[
["What does CPU stand for?",["Central Processing Unit","Computer Power Unit","Central Program Unit","Core Processor Utility"],0,"CPU = Central Processing Unit."],
["Which CPU component performs calculations?",["ALU","CU","Cache","Register"],0,"The Arithmetic Logic Unit handles maths and logic."],
["Increasing clock speed will…",["…decrease performance","…increase instructions per second","…have no effect","…reduce cache"],1,"Higher Hz = more FDE cycles per second."],
["More cores allow…",["Parallel processing","Slower memory","Bigger files","Cooler CPU"],0,"Each core executes its own instruction stream."],
["The CU stands for…",["Control Unit","Compute Unit","Cache Unit","Core Unit"],0,"Control Unit coordinates CPU activity."]],
exam:[[1,"State what the letters CPU stand for.","Central Processing Unit. (1)"],
[3,"Describe the role of the CPU in a computer system.","The CPU processes instructions (1). It does this through the fetch–decode–execute cycle (1). It is the main component that runs all software/programs (1)."],
[6,"Discuss how clock speed, cache size and number of cores affect CPU performance.","Clock speed measured in Hz determines how many FDE cycles per second; higher = faster (2). Cache is fast memory storing frequently used data; larger cache means fewer slow trips to RAM (2). More cores allow multiple instructions to be executed simultaneously (parallel processing), improving multitasking performance (2)."]]
},
"Fetch Decode Execute cycle":{
notes:`<h3>The Cycle</h3><ol><li><b>Fetch</b> – the next instruction is copied from RAM into a register inside the CPU.</li><li><b>Decode</b> – the Control Unit works out what the instruction means.</li><li><b>Execute</b> – the instruction is carried out (e.g. ALU does a calculation).</li></ol><p>The cycle then repeats — billions of times per second.</p>
<div class="tip">💡 Always mention this is repeated continuously.</div>`,
flash:[["What are the three stages of the FDE cycle?","Fetch, Decode, Execute."],
["Where are instructions fetched from?","From RAM/main memory."],
["Which CPU part decodes instructions?","The Control Unit (CU)."],
["What happens in the execute stage?","The instruction is carried out, often by the ALU."]],
quiz:[["What is the first stage of the cycle?",["Fetch","Decode","Execute","Store"],0,"Always fetch first."],
["Where is the instruction fetched from?",["RAM","Hard disk","Cache only","ROM"],0,"From main memory (RAM)."],
["Decoding is done by…",["The Control Unit","The ALU","The Cache","The Register"],0,"CU interprets instructions."]],
exam:[[3,"Describe the fetch–decode–execute cycle.","Fetch: instruction copied from RAM to CPU (1). Decode: CU works out what the instruction means (1). Execute: the instruction is carried out (1)."]]
},
"Registers":{
notes:`<h3>What are registers?</h3><p>Registers are very small, very fast storage locations inside the CPU used during the FDE cycle.</p>
<h3>Key registers (J277)</h3><ul><li><b>PC (Program Counter)</b> – holds the address of the next instruction.</li><li><b>MAR (Memory Address Register)</b> – holds the address being read/written.</li><li><b>MDR (Memory Data Register)</b> – holds data being transferred to/from memory.</li><li><b>Accumulator (ACC)</b> – stores results from the ALU.</li></ul>`,
flash:[["What does PC stand for?","Program Counter – holds the address of the next instruction."],
["What does MAR hold?","The memory address that is being read or written to."],
["What does MDR hold?","The data being transferred to/from memory."],
["What does the Accumulator do?","Stores the result of calculations from the ALU."]],
quiz:[["Which register stores the address of the next instruction?",["PC","MAR","MDR","ACC"],0,"Program Counter."],
["Where is the result of an ALU calculation stored?",["Accumulator","MAR","PC","Cache"],0,"The ACC holds intermediate results."]],
exam:[[4,"Describe the purpose of the PC, MAR, MDR and ACC.","PC holds address of next instruction (1). MAR holds address being accessed (1). MDR holds data being transferred (1). ACC stores results of ALU operations (1)."]]
},
"Cache":{
notes:`<h3>Cache</h3><p>Cache is a small amount of very fast memory built into (or close to) the CPU. It stores frequently used instructions and data so the CPU doesn't have to fetch them from slower RAM.</p>
<h3>Levels</h3><ul><li><b>L1</b> – smallest, fastest, on the CPU core.</li><li><b>L2</b> – larger, slightly slower.</li><li><b>L3</b> – largest, shared between cores.</li></ul>
<div class="tip">More cache → fewer cache misses → faster performance.</div>`,
flash:[["Why is cache used?","To store frequently used data so the CPU doesn't have to fetch from slower RAM."],
["Which cache level is fastest?","L1 cache."],
["What is a cache miss?","When the data the CPU needs is not in the cache, so it must fetch from RAM."]],
quiz:[["Cache is…",["Slower than RAM","Faster than RAM","The same as ROM","Permanent storage"],1,"Cache is faster than RAM."],
["Which cache is closest to the CPU core?",["L1","L2","L3","L4"],0,"L1 is smallest and fastest."]],
exam:[[3,"Explain how cache memory improves CPU performance.","Cache stores frequently used instructions/data (1) which can be accessed faster than RAM (1) so the CPU spends less time waiting for instructions, increasing the number of instructions executed per second (1)."]]
},
"Embedded systems":{
notes:`<h3>Embedded systems</h3><p>A computer system built into a larger device to perform a specific, dedicated task. Examples: washing machines, microwaves, traffic lights, car engine management.</p>
<h3>Features</h3><ul><li>Dedicated function</li><li>Often low power</li><li>Usually has firmware (software stored in ROM)</li><li>Cheaper and more reliable than general-purpose computers</li></ul>`,
flash:[["What is an embedded system?","A computer built into a device to perform a dedicated task."],
["Give two examples of embedded systems.","Washing machine, microwave, traffic light, car engine ECU."]],
quiz:[["Which is an embedded system?",["Laptop","Washing machine controller","Desktop PC","Server"],1,"Washing machines have dedicated controllers."],
["Embedded systems usually have…",["A general purpose OS","Firmware in ROM","Multiple monitors","A keyboard"],1,"Firmware is stored in ROM."]],
exam:[[2,"Define the term 'embedded system' and give an example.","A computer built into a larger device to perform a dedicated task (1), e.g. a microwave controller (1)."]]
},
"RAM":{
notes:`<h3>RAM</h3><p><b>Random Access Memory</b> is volatile main memory. It stores the OS, applications and data currently in use. Contents are lost when power is removed.</p>
<div class="tip">More RAM = more programs can run simultaneously without slowing the system down (less reliance on virtual memory).</div>`,
flash:[["Is RAM volatile or non-volatile?","Volatile – contents lost when power is off."],
["What is stored in RAM?","The OS, currently running programs and data in use."]],
quiz:[["RAM is…",["Volatile","Non-volatile","Read-only","Permanent"],0,"RAM loses data when power off."],
["Adding more RAM allows…",["Faster CPU clock","Running more programs at once","Bigger hard disk","Brighter screen"],1,"More space for processes."]],
exam:[[3,"Explain the purpose of RAM in a computer system.","RAM stores currently running programs and data (1), is volatile so loses data when power off (1), and is faster than secondary storage so the CPU can access data quickly (1)."]]
},
"ROM":{
notes:`<h3>ROM</h3><p><b>Read-Only Memory</b> is non-volatile memory that stores the <b>bootloader / BIOS</b> – the first instructions the CPU runs when the computer turns on.</p>`,
flash:[["Is ROM volatile?","No – it keeps its contents when power is removed."],
["What is stored in ROM?","The bootloader / BIOS used to start the computer."]],
quiz:[["ROM is used to store…",["The OS","User files","The bootloader","Web pages"],2,"It holds the start-up instructions."]],
exam:[[2,"Describe the purpose of ROM.","ROM is non-volatile (1) and stores the bootloader/BIOS used to start the computer (1)."]]
},
"Virtual memory":{
notes:`<h3>Virtual memory</h3><p>When RAM is full, the OS uses part of the hard disk as "extra" RAM. Inactive pages of data are swapped out to disk and brought back when needed.</p>
<div class="danger">Virtual memory is much slower than real RAM because disks are slow.</div>`,
flash:[["What is virtual memory?","Part of secondary storage used as extra RAM when RAM is full."],
["Why is virtual memory slower than RAM?","Because secondary storage is much slower than RAM."]],
quiz:[["Virtual memory uses…",["Cache","Secondary storage","ROM","CPU registers"],1,"It uses the hard disk."]],
exam:[[3,"Explain how virtual memory works.","When RAM is full (1) the OS moves inactive data to secondary storage (1) and brings it back to RAM when needed, allowing more programs to run than RAM would normally allow (1)."]]
},
"Secondary storage":{
notes:`<h3>Secondary storage</h3><p>Non-volatile storage used to keep programs and data long-term. Examples: HDD, SSD, USB stick, DVD.</p>
<h3>Choosing storage</h3><p>Compare on: capacity, speed, portability, durability, cost per GB, reliability.</p>`,
flash:[["Why is secondary storage needed?","To keep data long-term, even when the computer is off."],
["Name 3 factors when choosing storage.","Capacity, speed, cost, portability, durability."]],
quiz:[["Which is secondary storage?",["RAM","ROM","SSD","Cache"],2,"SSD is non-volatile long-term storage."]],
exam:[[4,"A school is choosing between an SSD and an HDD for student PCs. Discuss the considerations.","HDD: cheaper per GB, larger capacities available (1) but slower, mechanical parts so less durable (1). SSD: much faster, silent, more durable (1) but more expensive per GB (1)."]]
},
"Optical storage":{
notes:`<h3>Optical (CD/DVD/Blu-ray)</h3><p>Data stored as pits and lands on a disc, read by a laser.</p>
<p><b>Pros:</b> cheap, portable, durable. <b>Cons:</b> low capacity, slow, scratches easily.</p>`,
flash:[["How is data read on optical media?","A laser reflects off pits and lands on the disc surface."],
["Give a disadvantage of optical storage.","Low capacity, slow, easily scratched."]],
quiz:[["A DVD is an example of…",["Magnetic storage","Optical storage","Solid state","Cloud"],1,"DVDs use lasers."]],
exam:[[2,"State two advantages of optical storage.","Cheap to produce (1); portable / easy to distribute (1)."]]
},
"Magnetic storage":{
notes:`<h3>Magnetic (HDD)</h3><p>Data stored as magnetised regions on spinning platters. A read/write head moves above the platter.</p>
<p><b>Pros:</b> very high capacity, low cost per GB. <b>Cons:</b> mechanical parts → slower, fragile, noisy.</p>`,
flash:[["How does an HDD store data?","Magnetising regions on spinning metal platters."],
["Why are HDDs less durable than SSDs?","HDDs contain moving mechanical parts that can break."]],
quiz:[["HDDs store data by…",["Lasers","Magnetism","Electrons in flash cells","Punch holes"],1,"Magnetic platters."]],
exam:[[3,"Compare magnetic and solid state storage.","Magnetic has higher capacity per £ (1); SSD has no moving parts so faster and more durable (1); SSD is silent and uses less power (1)."]]
},
"Solid state storage":{
notes:`<h3>SSD / Flash</h3><p>Uses electronic flash memory cells with no moving parts. Used in SSDs, USB sticks, SD cards.</p>
<p><b>Pros:</b> fast, silent, durable, low power. <b>Cons:</b> more expensive per GB, limited write cycles.</p>`,
flash:[["What is solid state storage made of?","Flash memory cells – no moving parts."],
["Give two advantages of SSD over HDD.","Faster, more durable, silent, lower power."]],
quiz:[["A USB memory stick is…",["Magnetic","Optical","Solid state","Cache"],2,"Flash memory."]],
exam:[[2,"State two reasons SSDs are used in laptops.","Faster boot/load times (1); more durable to being dropped (1)."]]
},
"LAN":{
notes:`<h3>LAN</h3><p><b>Local Area Network</b> – computers connected over a small geographic area (one building/site). Hardware is usually owned by the organisation.</p>`,
flash:[["What does LAN stand for?","Local Area Network."],
["Give an example of a LAN.","A school or office network."]],
quiz:[["A school network is a…",["LAN","WAN","PAN","MAN"],0,"Local Area Network."]],
exam:[[2,"Describe two characteristics of a LAN.","Covers a small geographic area (1); hardware owned by the organisation (1)."]]
},
"WAN":{
notes:`<h3>WAN</h3><p><b>Wide Area Network</b> – connects computers over a large geographic area (the Internet is the biggest WAN). Uses third-party infrastructure (telecoms/ISPs).</p>`,
flash:[["What is a WAN?","A Wide Area Network covering a large geographic area."],
["Give an example of a WAN.","The Internet."]],
quiz:[["The Internet is an example of…",["LAN","WAN","PAN","Bus"],1,"World's largest WAN."]],
exam:[[2,"Give one difference between a LAN and a WAN.","A LAN covers a small area / single site (1); a WAN covers a large geographic area and uses third-party infrastructure (1)."]]
},
"Network hardware":{
notes:`<h3>Hardware</h3><ul><li><b>NIC</b> – network interface card, connects device to network.</li><li><b>Switch</b> – connects devices on a LAN, sends data to the correct device.</li><li><b>Router</b> – connects different networks (e.g. LAN to WAN), routes packets.</li><li><b>Wireless Access Point</b> – allows wireless devices to connect.</li><li><b>Transmission media</b> – copper cable, fibre optic, radio waves.</li></ul>`,
flash:[["What does NIC stand for?","Network Interface Card."],
["What does a router do?","Connects networks together and routes data packets between them."],
["What is a switch?","Hardware that connects devices on a LAN and sends data only to the destination device."]],
quiz:[["Which device connects a LAN to the Internet?",["Switch","Router","NIC","Hub"],1,"Routers connect networks."],
["A switch sends data to…",["All devices","Only the destination device","The router only","No devices"],1,"Switches use MAC addresses."]],
exam:[[3,"Describe the role of a router, switch and NIC.","Router: connects different networks and routes packets (1). Switch: connects devices on a LAN and forwards data to the correct one (1). NIC: lets a device physically connect to the network (1)."]]
},
"Protocols":{
notes:`<h3>Protocols</h3><p>A set of rules governing communication between devices.</p>
<ul><li><b>TCP/IP</b> – core internet protocol suite.</li><li><b>HTTP/HTTPS</b> – web pages (S = secure, encrypted).</li><li><b>FTP</b> – file transfer.</li><li><b>SMTP</b> – sending email.</li><li><b>POP3/IMAP</b> – receiving email.</li></ul>`,
flash:[["What is a protocol?","A set of rules for communication between devices."],
["What is HTTPS used for?","Secure (encrypted) transfer of web pages."],
["What does SMTP do?","Sends emails."],
["Difference between POP3 and IMAP?","POP3 downloads and removes from server; IMAP keeps email on the server and syncs."]],
quiz:[["What does HTTP stand for?",["HyperText Transfer Protocol","High Transfer Text Protocol","Home Text Transmission Protocol","Hyper Test Tunnel Protocol"],0,"HyperText Transfer Protocol."],
["Which protocol is used to send email?",["POP3","IMAP","SMTP","FTP"],2,"SMTP = Send Mail."]],
exam:[[4,"State the purpose of HTTPS, FTP, SMTP and IMAP.","HTTPS: secure web page transfer (1). FTP: file transfer (1). SMTP: sending email (1). IMAP: receiving/syncing email on server (1)."]]
},
"Ethernet":{
notes:`<h3>Ethernet</h3><p>Family of wired networking technologies, defined by IEEE 802.3. Uses cables (e.g. Cat5/Cat6) and switches to connect devices on a LAN.</p>`,
flash:[["What is Ethernet?","A wired networking standard for LANs."],
["Is Ethernet wired or wireless?","Wired."]],
quiz:[["Ethernet is a…",["Wireless standard","Wired LAN standard","Mobile network","Web protocol"],1,"Wired LAN."]],
exam:[[2,"State two advantages of Ethernet over Wi-Fi.","Faster / more reliable speeds (1); more secure as cables are physical (1)."]]
},
"Wireless networks":{
notes:`<h3>Wi-Fi</h3><p>Wireless networking using radio waves (IEEE 802.11). Convenient but slower and less secure than wired. Use <b>WPA2/WPA3</b> encryption and strong passwords.</p>`,
flash:[["What standard does Wi-Fi use?","IEEE 802.11."],
["Name an encryption standard for Wi-Fi.","WPA2 or WPA3."]],
quiz:[["Wi-Fi uses…",["Light","Radio waves","Magnetism","Electricity through cables"],1,"Radio waves."]],
exam:[[3,"Compare wired and wireless networks.","Wired: faster, more reliable, more secure (1). Wireless: more convenient, allows mobility, no cabling (1). Wireless is generally slower and more vulnerable to interception (1)."]]
},
"Malware":{
notes:`<h3>Malware</h3><p><b>Malicious software</b> designed to damage or gain unauthorised access.</p>
<ul><li><b>Virus</b> – attaches to files, spreads when run.</li><li><b>Worm</b> – self-replicates across networks.</li><li><b>Trojan</b> – disguised as legitimate software.</li><li><b>Spyware</b> – secretly collects data.</li><li><b>Ransomware</b> – encrypts data and demands payment.</li></ul>`,
flash:[["What is malware?","Malicious software designed to damage or gain unauthorised access."],
["What does ransomware do?","Encrypts a victim's files and demands payment to decrypt."],
["What is a Trojan?","Malware disguised as legitimate software."]],
quiz:[["Which malware self-replicates over a network?",["Virus","Worm","Trojan","Spyware"],1,"Worms spread by themselves."],
["Ransomware…",["Steals passwords","Encrypts data and demands money","Sends spam","Mines crypto"],1,"Then asks for payment."]],
exam:[[4,"Describe four different forms of malware.","Virus: attaches to files and spreads when executed (1). Worm: self-replicates across networks (1). Trojan: disguised as legitimate software (1). Ransomware/Spyware: encrypts data for payment / secretly gathers information (1)."]]
},
"Phishing":{
notes:`<h3>Phishing</h3><p>Social engineering attack that tricks users into giving away personal information, usually via emails pretending to be from a trusted source.</p>
<h3>Prevention</h3><ul><li>Check sender address</li><li>Don't click suspicious links</li><li>Spam filters</li><li>User training</li></ul>`,
flash:[["What is phishing?","Tricking users into giving away personal info via fake emails/messages."],
["Name two phishing prevention methods.","User training, spam filters, checking sender addresses."]],
quiz:[["Phishing usually uses…",["Emails","Hardware","Encryption","Compilers"],0,"Fake emails."]],
exam:[[3,"Describe phishing and how it can be prevented.","Phishing is sending fake messages to trick users into revealing personal information (1). It can be prevented by user training (1) and using spam filters / checking links (1)."]]
},
"Brute force attacks":{
notes:`<h3>Brute force</h3><p>Trying every possible password combination until the correct one is found.</p>
<h3>Prevention</h3><ul><li>Strong passwords</li><li>Account lockouts after N attempts</li><li>CAPTCHAs</li><li>Two-factor authentication</li></ul>`,
flash:[["What is a brute force attack?","Trying every possible password until the right one is found."],
["How can brute force attacks be prevented?","Strong passwords, account lockouts, CAPTCHAs, 2FA."]],
quiz:[["A brute force attack tries…",["One password","Every possible password","Encryption keys only","SQL"],1,"Every combination."]],
exam:[[2,"Suggest two ways to defend against brute force attacks.","Lock account after N failed attempts (1); enforce strong/long passwords (1)."]]
},
"Encryption":{
notes:`<h3>Encryption</h3><p>Scrambling data using a key so it can only be read by someone with the correct key. Even if intercepted, the data is unreadable.</p>
<p>Used in: HTTPS, Wi-Fi (WPA2/3), messaging, stored files.</p>`,
flash:[["What is encryption?","Scrambling data with a key so only someone with the key can read it."],
["Give an example of where encryption is used.","HTTPS, WPA2 Wi-Fi, messaging apps."]],
quiz:[["Encryption protects…",["Speed","Confidentiality","Storage size","CPU"],1,"Keeps data unreadable."]],
exam:[[3,"Explain why encryption is used when sending data over the Internet.","Data can be intercepted in transit (1). Encryption scrambles the data using a key (1) so even if intercepted, an attacker without the key cannot read it (1)."]]
},
"Firewalls":{
notes:`<h3>Firewall</h3><p>Hardware or software that monitors traffic entering/leaving a network and blocks anything that doesn't meet its rules.</p>`,
flash:[["What does a firewall do?","Monitors and filters incoming/outgoing network traffic based on rules."],
["Can a firewall be software?","Yes – it can be software, hardware, or both."]],
quiz:[["A firewall is used to…",["Speed up the CPU","Filter network traffic","Encrypt files","Defrag the disk"],1,"Filters traffic."]],
exam:[[2,"Describe what a firewall does.","Monitors traffic between a network and the outside (1) and blocks traffic that doesn't follow security rules (1)."]]
},
"User access levels":{
notes:`<h3>User access levels</h3><p>Different users have different rights to data/features. E.g. a school: students can read homework, teachers can edit grades, admins can change passwords.</p>`,
flash:[["What are user access levels?","Restrictions on what each user is allowed to see/do on a system."],
["Why are access levels used?","To protect data from being seen/changed by unauthorised users."]],
quiz:[["Access levels help to…",["Speed up Wi-Fi","Protect data","Encrypt RAM","Defragment storage"],1,"Restrict who can access what."]],
exam:[[3,"Explain why a school would use user access levels on its network.","To stop students editing teacher data / grades (1). Different users have different needs (1). Reduces risk of accidental or malicious data changes (1)."]]
},
"Operating systems":{
notes:`<h3>OS</h3><p>Software that manages hardware and provides services for applications.</p>
<h3>Functions</h3><ul><li>User interface</li><li>Memory management & multitasking</li><li>Peripheral / device management</li><li>File management</li><li>User management</li><li>Security</li></ul>`,
flash:[["Name 4 functions of an OS.","User interface, memory management, file management, peripheral management, security, user management."],
["What is multitasking?","Running multiple programs apparently at the same time by sharing CPU time."]],
quiz:[["Which is NOT an OS function?",["File management","Encryption of GPU","Memory management","Peripheral management"],1,"OSes don't 'encrypt the GPU'."]],
exam:[[4,"Describe four functions of an operating system.","User interface to interact with the computer (1). Memory management – allocates RAM to programs (1). Peripheral management – drivers for devices (1). User management & security – accounts and permissions (1)."]]
},
"Utility software":{
notes:`<h3>Utility software</h3><p>Software that performs maintenance/housekeeping tasks.</p>
<ul><li><b>Defragmentation</b> – reorganises files on HDD for faster access.</li><li><b>Backup</b> – copies files for recovery.</li><li><b>Compression</b> – reduces file size.</li><li><b>Encryption</b> – scrambles data.</li><li><b>Antivirus / Anti-malware</b></li></ul>`,
flash:[["What is defragmentation?","Reorganising files on a HDD so they're stored contiguously, making access faster."],
["Name two utility programs.","Defragmenter, backup, antivirus, compression, encryption."]],
quiz:[["Defragmentation is used on…",["SSDs","HDDs","RAM","Cache"],1,"Not needed on SSDs."]],
exam:[[3,"Describe three pieces of utility software.","Defragmenter reorganises HDD files for speed (1). Backup software copies data so it can be recovered (1). Antivirus scans for and removes malware (1)."]]
},
"File management":{
notes:`<h3>File management</h3><p>The OS organises files into folders, allows users to rename/move/delete/copy, controls access permissions, and tracks where files are stored.</p>`,
flash:[["Give 3 things file management lets a user do.","Create, rename, move, copy, delete, set permissions."]],
quiz:[["File management is provided by…",["The CPU","The OS","RAM","The router"],1,"OS feature."]],
exam:[[2,"Describe two file management tasks performed by the OS.","Organising files into directories (1); controlling user permissions on files (1)."]]
},
"User interfaces":{
notes:`<h3>User interfaces</h3><ul><li><b>GUI</b> – Graphical User Interface (windows, icons).</li><li><b>CLI</b> – Command Line Interface (text commands).</li><li><b>Menu driven</b> – e.g. cash machines.</li><li><b>Voice / NLI</b> – voice assistants.</li></ul>`,
flash:[["What does GUI stand for?","Graphical User Interface."],
["Give one advantage of a CLI.","Faster for experienced users; uses fewer resources."]],
quiz:[["A CLI is…",["Graphical","Text-based","Voice-only","Menu-only"],1,"Command Line = text."]],
exam:[[3,"Compare a GUI and a CLI.","GUI is easier for beginners – icons and windows (1). CLI uses less memory and can be faster for experts (1). GUI uses more system resources / graphics (1)."]]
},
"Copyright":{
notes:`<h3>Copyright Designs and Patents Act 1988</h3><p>Protects the rights of creators of original works (software, music, text). Illegal to copy/distribute without permission.</p>`,
flash:[["What is copyright?","Legal protection that gives creators control over how their work is used."],
["Which law protects copyright in the UK?","Copyright Designs and Patents Act 1988."]],
quiz:[["Copying software without permission breaks…",["Data Protection Act","Computer Misuse Act","Copyright Act","Equality Act"],2,"Copyright."]],
exam:[[2,"Describe what the Copyright Designs and Patents Act protects.","Protects creators' rights over original works (1) and makes copying/distributing without permission illegal (1)."]]
},
"Data protection":{
notes:`<h3>Data Protection Act 2018 / UK GDPR</h3><p>Controls how organisations use personal data. Must be: lawful, accurate, kept up to date, kept securely, used for stated purpose, not kept longer than needed.</p>`,
flash:[["Which law covers personal data in the UK?","Data Protection Act 2018 (UK GDPR)."],
["Name 2 principles of data protection.","Lawful use, accuracy, security, purpose limitation, storage limitation."]],
quiz:[["Personal data must be kept…",["As long as possible","Only as long as needed","Forever","Sold yearly"],1,"Storage limitation principle."]],
exam:[[3,"Describe three principles of the Data Protection Act.","Data must be accurate and up to date (1). Data must be kept secure (1). Data must only be used for the stated purpose (1)."]]
},
"Computer misuse":{
notes:`<h3>Computer Misuse Act 1990</h3><p>Makes the following illegal: unauthorised access to data; unauthorised access with intent to commit further offences; unauthorised modification of data; making/supplying tools for hacking.</p>`,
flash:[["Which act makes hacking illegal?","Computer Misuse Act 1990."],
["Name an offence under the Computer Misuse Act.","Unauthorised access; unauthorised modification; making/supplying hacking tools."]],
quiz:[["The Computer Misuse Act covers…",["Sharing music","Hacking","Filming","Driving"],1,"Hacking offences."]],
exam:[[3,"State three offences covered by the Computer Misuse Act 1990.","Unauthorised access to data (1); unauthorised access with intent to commit further crime (1); unauthorised modification of data (1)."]]
},
"Environmental impact":{
notes:`<h3>Environment</h3><p>Issues: energy use of data centres, e-waste, mining of rare materials. Mitigations: recycling, energy efficient hardware, cloud computing for shared resources.</p>`,
flash:[["Give one environmental concern of computing.","E-waste, energy use of data centres, mining of rare metals."],
["How can e-waste be reduced?","Recycling, repairing, upgrading instead of replacing."]],
quiz:[["E-waste is…",["Spam emails","Discarded electronics","Wasted electricity","Used USBs sold"],1,"Old electronics."]],
exam:[[3,"Discuss the environmental impact of computers.","Manufacturing uses rare materials – mining damages environment (1). Data centres use huge amounts of electricity (1). E-waste contains toxic materials and can pollute when not recycled (1)."]]
},
"Digital divide":{
notes:`<h3>Digital divide</h3><p>The gap between people who do and don't have access to modern technology (often based on income, age, geography).</p>`,
flash:[["What is the digital divide?","The gap between those with and without access to digital technology."]],
quiz:[["Digital divide is mainly about…",["Wi-Fi speed","Access inequality","Pixel density","CPU speed"],1,"Access inequality."]],
exam:[[3,"Explain the digital divide and one consequence of it.","Some people/regions have less access to technology and Internet than others (1), often due to cost or location (1). This means they cannot access online services such as education or government services (1)."]]
},
"Algorithms":{
notes:`<h3>Algorithm</h3><p>A step-by-step set of instructions for solving a problem. Algorithms can be represented in pseudocode or flowcharts.</p>
<h3>Computational thinking</h3><ul><li><b>Abstraction</b> – removing unnecessary detail.</li><li><b>Decomposition</b> – breaking a problem into smaller parts.</li><li><b>Algorithmic thinking</b> – step-by-step solutions.</li></ul>`,
flash:[["What is an algorithm?","A step-by-step set of instructions for solving a problem."],
["What is decomposition?","Breaking a problem into smaller, more manageable parts."],
["What is abstraction?","Removing unnecessary detail from a problem."]],
