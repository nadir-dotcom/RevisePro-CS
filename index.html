const NOTE_EXPANSIONS = {
"CPU":["The CPU (Central Processing Unit) executes program instructions and controls the computer's operations through the fetch–decode–execute cycle.","The arithmetic logic unit (ALU) performs calculations and Boolean comparisons, while the control unit coordinates components using control signals.","Clock speed is measured in hertz and indicates cycles per second; a higher speed can execute more instructions but may increase heat and power use.","Multiple cores can process separate instruction streams simultaneously, although software must support parallel processing to gain the full benefit.","A larger cache stores more frequently used instructions close to the CPU, reducing slower accesses to RAM and improving performance."],
"Fetch Decode Execute cycle":["During fetch, the address in the program counter is copied to the MAR, then the instruction at that address is transferred from memory to the MDR.","The fetched instruction is copied to the current instruction register, and the program counter is incremented to point to the next instruction.","During decode, the control unit interprets the instruction and identifies the operation and any data or addresses it requires.","During execute, the appropriate component carries out the instruction; for example, the ALU may calculate a value that is stored in the accumulator.","The cycle repeats continuously while a program runs; exam answers should name all three stages and explain what happens rather than merely listing them."],
"Registers":["Registers are tiny, extremely fast storage locations inside the CPU that hold instructions, addresses, data and intermediate results during processing.","The program counter (PC) stores the address of the next instruction to fetch and is normally incremented after each fetch.","The memory address register (MAR) stores the address in memory currently being read from or written to.","The memory data register (MDR) stores the data or instruction being transferred between memory and the CPU.","The accumulator stores intermediate arithmetic and logic results produced by the ALU; do not confuse it with long-term storage."],
"Cache":["Cache is small-capacity, high-speed memory located in or close to the CPU and is faster to access than RAM.","It holds copies of frequently or recently used instructions and data because these are likely to be needed again soon.","Finding required data in cache avoids a slower transfer from RAM, so the CPU spends less time waiting and executes instructions faster.","Increasing cache size can improve performance by increasing the chance that required data is present, although cache is expensive.","Cache is volatile primary memory, not permanent secondary storage; its purpose is speed rather than long-term capacity."],
"Embedded systems":["An embedded system is a computer built into a larger device to perform a specific, dedicated function rather than many general-purpose tasks.","Examples include washing-machine controllers, traffic-light systems and car engine-management units, each responding to inputs to control outputs.","Their software is often firmware stored in non-volatile memory so the device can start reliably whenever it receives power.","They are commonly designed for low cost, low power consumption, small size and dependable real-time operation.","A desktop computer is not normally embedded because users can install many applications; the key distinction is a dedicated role within another product."],
"RAM":["RAM (Random Access Memory) is volatile primary storage holding programs and data currently being used by the CPU.","Its contents are lost when power is removed, so files must be saved to non-volatile secondary storage for long-term retention.","The operating system, running applications and their active data are loaded from secondary storage into RAM because RAM is much faster.","More RAM allows more or larger programs to remain active without relying as heavily on slower virtual memory.","RAM capacity does not increase CPU clock speed; it improves performance mainly when insufficient memory was causing frequent swapping."],
"ROM":["ROM (Read-Only Memory) is non-volatile primary memory whose contents remain available when electrical power is removed.","It stores instructions needed to start a device, such as boot firmware that checks hardware and begins loading the operating system.","ROM is suitable for instructions that should not change during normal use, including firmware in many embedded systems.","Unlike RAM, ROM is not used as the working area for programs and data that continually change while software runs.","Exam questions often contrast volatility and purpose: RAM is temporary working memory, whereas ROM retains start-up or fixed instructions."],
"Virtual memory":["Virtual memory is an area of secondary storage used temporarily when there is insufficient free RAM for all active programs and data.","The operating system moves inactive sections from RAM to secondary storage and restores them when they are needed again.","This enables programs to continue running when physical RAM is full, but it does not provide the same speed as adding more RAM.","Secondary storage has slower access times than RAM, so frequent movement can cause noticeable delays known as disk thrashing.","Virtual memory is not extra physical memory and is not ROM; it is managed space on an HDD or SSD."],
"Secondary storage":["Secondary storage is non-volatile storage used to retain programs and user data when the computer is switched off.","Common technologies are magnetic hard disks, optical discs and solid-state flash storage, each with different strengths and limitations.","Storage choices are compared using capacity, speed, durability, reliability, portability and cost per unit of storage.","A server backup may prioritise high capacity and low cost, while a mobile device may prioritise low power use, durability and size.","Secondary storage is generally slower than RAM but offers far greater capacity and persistent storage at a lower cost per gigabyte."],
"Optical storage":["Optical media stores data as physical patterns on a disc that are detected through differences in reflected laser light.","CDs, DVDs and Blu-ray discs use the same principle but have different capacities because of track spacing and laser technology.","Discs are inexpensive to manufacture and distribute, making them useful for music, films or archived material.","They usually have lower capacity and slower access than modern HDDs and SSDs, and scratches can make data unreadable.","Optical storage is non-volatile and removable; it should not be confused with magnetic storage because it uses light rather than magnetisation."],
"Magnetic storage":["Magnetic storage represents binary data by magnetising areas of a surface in different directions.","A hard disk drive uses rapidly spinning platters and a moving read/write head to locate and change these magnetic regions.","HDDs offer large capacities and low cost per gigabyte, so they are suitable for desktop storage and large backups.","Moving parts make HDDs noisier, slower, more power-hungry and more vulnerable to damage from impact than SSDs.","Magnetic tape provides very high-capacity sequential storage for backups, but locating individual files is slower than direct-access media."],
"Solid state storage":["Solid-state storage records data electronically in flash-memory cells and contains no moving mechanical parts.","SSDs, USB flash drives and memory cards are common examples, although their shape and intended use differ.","Electronic access gives fast read times, silent operation, low power consumption and strong resistance to knocks.","Solid-state storage usually costs more per gigabyte than magnetic storage and memory cells have a limited number of write cycles.","For laptops, its durability and low power use are important; for large archives, cheaper magnetic storage may be more appropriate."],
"LAN":["A local area network (LAN) connects devices across a small geographical area such as one building, school or site.","The organisation normally owns and manages the connecting hardware and transmission media used by its LAN.","A LAN allows users to share files, printers, applications and an internet connection, reducing duplication of resources.","Central user accounts and backups can improve management, although network failure or attacks may affect many connected users.","LAN describes geographical scope, not whether connections are wired or wireless; either transmission method can be used."],
"WAN":["A wide area network (WAN) connects devices or smaller networks over a large geographical area, such as between cities or countries.","WAN links commonly use infrastructure rented from telecommunications companies because one organisation does not own every connection.","The internet is the largest WAN, joining networks worldwide through routers and agreed communication protocols.","A business can use a WAN to connect branch-office LANs and share central services across distant sites.","Compared with a LAN, a WAN commonly has higher latency, greater dependence on third parties and more security considerations."],
"Network hardware":["A network interface controller (NIC) enables a device to connect to a network and has a unique MAC address used on the local network.","A switch connects devices within a LAN and forwards frames to the correct port using destination MAC addresses.","A router connects different networks and forwards packets toward their destinations using IP addresses.","A wireless access point allows wireless devices to join a network by transmitting and receiving radio signals.","Transmission media include copper cable, fibre-optic cable and radio waves; bandwidth, interference, distance and cost affect the choice."],
"Protocols":["A protocol is an agreed set of rules defining how devices format, transmit, receive and interpret data.","TCP divides data into packets, checks successful delivery and reorders packets, while IP supplies addressing and routing across networks.","HTTP transfers web-page data and HTTPS adds encryption and authentication for safer communication with websites.","FTP transfers files; SMTP sends email, while IMAP retrieves and synchronises email held on a server.","Protocols allow hardware and software from different manufacturers to communicate consistently; ports distinguish services on one device."],
"Ethernet":["Ethernet is a family of standards used for wired communication on local area networks.","Devices usually connect through copper cables to a switch, which forwards frames according to MAC addresses.","Wired Ethernet typically offers stable speed, low latency and less interference than wireless connections.","Cable length and physical access restrict mobility, and installing cables across a building can be disruptive or expensive.","Ethernet is a connection technology, not the internet itself; a router links the Ethernet LAN to other networks."],
"Wireless networks":["Wireless networking uses radio waves to connect devices without physical data cables, commonly through a wireless access point.","It provides mobility and convenient installation, making it suitable for phones, tablets and locations where cabling is impractical.","Signals have limited range and may be weakened by walls or disrupted by interference from other equipment and networks.","Because signals travel through open space, encryption such as WPA2 or WPA3 and a strong password are needed to reduce unauthorised access.","Wireless speed and reliability can vary with distance and congestion; wired Ethernet may be preferable for consistent high performance."],
"Malware":["Malware is software created to damage systems, disrupt operation, steal data or gain unauthorised access.","Viruses attach to files and spread when executed, worms self-replicate across networks, and Trojans disguise themselves as legitimate software.","Ransomware encrypts files and demands payment, while spyware secretly gathers information such as passwords or browsing activity.","Protection includes anti-malware scanning, timely updates, firewalls, restricted permissions and avoiding untrusted downloads.","A virus is one type of malware, not a synonym for every threat; exam answers should identify the specific behaviour and impact."],
"Phishing":["Phishing uses deceptive messages or websites to persuade users to reveal confidential information or install malicious software.","Attackers often imitate trusted organisations and create urgency, directing victims to a fake login page through a misleading link.","Warning signs include unexpected requests, unusual sender addresses, spelling errors and URLs that do not match the claimed organisation.","Users should verify requests through a separate trusted channel, avoid suspicious links and report messages to administrators.","Spam filtering and staff training reduce risk, but phishing exploits human trust rather than a purely technical weakness."],
"Brute force attacks":["A brute-force attack systematically tries many password or encryption-key combinations until the correct one is found.","Long passwords with varied characters create far more combinations and therefore require more time to guess.","Account lockouts, increasing delays and CAPTCHAs restrict automated attempts, although lockouts can also be abused to deny access.","Two-factor authentication adds a separate proof of identity, so a guessed password alone is insufficient.","Brute force is different from phishing: it guesses credentials computationally instead of tricking a user into revealing them."],
"Encryption":["Encryption transforms readable plaintext into unreadable ciphertext using an algorithm and an encryption key.","Authorised recipients use the correct key to decrypt the ciphertext and recover the original data.","It protects confidentiality when data is stored or transmitted, because intercepted ciphertext should be meaningless without the key.","HTTPS, encrypted messaging and protected wireless networks are real-world uses of encryption.","Encryption does not prevent data being intercepted or deleted; it reduces the value of stolen data and depends on secure key management."],
"Firewalls":["A firewall monitors incoming and outgoing network traffic and applies rules to allow or block connections.","Rules may examine IP addresses, port numbers, protocols or whether a connection was requested from inside the network.","Firewalls can be software on one device or hardware protecting an entire network at its boundary.","Blocking unnecessary ports and suspicious sources reduces opportunities for unauthorised network access.","A firewall is one layer of defence and cannot replace updates, anti-malware tools or careful users, especially against threats already inside."],
"User access levels":["Access levels define which files, data and system actions each authenticated user is permitted to use.","The principle of least privilege gives users only the permissions needed for their role, limiting accidental and deliberate damage.","For example, pupils may read shared resources, teachers may edit marks, and administrators may manage accounts and software.","Permissions should be reviewed when responsibilities change and accounts should not be shared between users.","Authentication proves who a user is, whereas authorisation through access levels determines what that identified user may do."],
"Operating systems":["An operating system manages computer hardware and provides an environment in which applications can run.","Memory management allocates RAM to processes, keeps processes separate and may manage virtual memory when RAM is limited.","Processor management schedules CPU time so several programs can appear to run concurrently through multitasking.","Peripheral management uses device drivers to communicate with hardware, while file management organises stored data into files and directories.","The OS also provides a user interface, accounts, access rights and security; exam answers should explain functions rather than list names only."],
"Utility software":["Utility software maintains, protects or optimises a computer system rather than carrying out the user's main productive task.","Backup utilities copy data so it can be restored after deletion, damage or hardware failure; a backup must be stored separately.","Compression utilities reduce file size for storage or transmission and later reconstruct the data when required.","Encryption utilities protect confidentiality, while anti-malware utilities scan, quarantine and remove malicious software.","Defragmentation rearranges fragmented HDD files into contiguous blocks for faster access, but it is unnecessary and undesirable for SSDs."],
"File management":["File management allows users and programs to create, name, copy, move, rename and delete files and folders.","A hierarchical directory structure groups related files and provides paths that identify their locations.","The operating system records metadata such as file type, size, dates and access permissions.","Meaningful names and organised folders make data easier to locate, while permissions prevent unauthorised viewing or modification.","File management is an operating-system service; it does not itself replace backups, which preserve recoverable copies elsewhere."],
"User interfaces":["A user interface is the method through which a person gives commands to a computer and receives output.","A graphical user interface uses windows, icons, menus and pointers, making common tasks intuitive but consuming more system resources.","A command-line interface accepts typed commands, using few resources and enabling automation but requiring users to learn exact syntax.","Menu-driven interfaces restrict users to listed choices and are suitable for kiosks or cash machines where tasks are predictable.","The best interface depends on the users, hardware and task; exam comparisons should link each feature to a specific context."],
"Copyright":["Copyright automatically gives creators legal control over copying, adapting and distributing original works including software, images, music and text.","The Copyright, Designs and Patents Act 1988 makes using or distributing protected work without permission or a valid licence unlawful.","Buying software normally purchases a licence to use it under stated conditions, not ownership of its copyright.","Open-source and Creative Commons works still have copyright, but their licences grant specified permissions when conditions are followed.","Possible consequences of infringement include removal of content, financial damages and prosecution; acknowledging a source alone may not grant permission."],
"Data protection":["The Data Protection Act 2018 controls how organisations collect, process, store and share personal data about identifiable people.","Data must be processed lawfully, fairly and transparently for specified purposes, with no more collected than is necessary.","Records should be accurate, retained only as long as required and protected using appropriate organisational and technical security.","Individuals have rights over their data, including access to information held about them and correction of inaccurate records.","Data protection does not ban organisations from using personal data; it requires responsible, lawful processing and accountability."],
"Computer misuse":["The Computer Misuse Act 1990 makes intentionally accessing computer material without authorisation an offence.","Unauthorised access with intent to commit or assist another offence is treated as a more serious offence.","Unauthorised acts that impair operation or alter data include deploying malware or deliberately deleting another person's files.","Making, supplying or obtaining tools for use in computer-misuse offences can also be illegal.","Permission is central: security testing can be lawful when explicitly authorised, but curiosity is not a defence for accessing another system."],
"Environmental impact":["Manufacturing computers consumes energy, water and finite raw materials, while mining can damage habitats and pollute surrounding areas.","Data centres and network infrastructure use substantial electricity and cooling, producing emissions when energy comes from fossil fuels.","Discarded electronic equipment creates e-waste that may contain hazardous substances and valuable materials that should be recovered safely.","Repairing, upgrading, reusing and recycling devices can extend product life and reduce demand for new resources.","Energy-efficient components, power-management settings and renewable electricity reduce impacts, although online services still require physical infrastructure."],
"Digital divide":["The digital divide is inequality between people or groups in access to digital devices, reliable connectivity and the skills to use them.","Causes include low income, poor rural infrastructure, disability, age, limited education and lack of suitable services.","People without effective access may be disadvantaged in education, employment, communication, banking and government services.","Public internet facilities, affordable devices, accessible design, infrastructure investment and skills training can reduce the divide.","Owning a phone does not necessarily remove the divide if data is unaffordable, connectivity is unreliable or services are inaccessible."],
"Algorithms":["An algorithm is a finite, ordered sequence of unambiguous steps that solves a problem or completes a task.","Decomposition breaks a complex problem into smaller manageable sub-problems that can be designed, coded and tested separately.","Abstraction removes irrelevant detail so attention is focused on information and processes essential to the solution.","Inputs, processing and expected outputs should be identified before an algorithm is represented using pseudocode or a flowchart.","Algorithms can be compared for correctness and efficiency; tracing with normal, boundary and invalid data helps expose logical errors."],
"Flowcharts":["A flowchart represents an algorithm visually using standard symbols connected by arrows that show the direction of control flow.","Terminator ovals mark start or end, rectangles show processes, parallelograms show input/output and diamonds show decisions.","Decision branches should be labelled with outcomes such as Yes/No so every possible route is clear.","Loops are created by an arrow returning to an earlier decision or process, not by inventing a separate loop symbol.","Flowcharts help communicate and trace logic before coding, but large algorithms can become less concise than structured pseudocode."],
"Pseudocode":["Pseudocode expresses an algorithm using structured, language-independent statements that resemble programming code.","It should show sequence, selection and iteration clearly with meaningful identifiers and consistent indentation.","Assignments change stored values, while input and output statements communicate with the user; comparisons form Boolean conditions.","Because pseudocode is not executed, minor syntax varies, but its logic must still be precise and traceable.","In OCR questions, follow the given reference style and dry-run each statement rather than assuming it behaves like one particular language."],
"Linear search":["Linear search begins at one end of a collection and compares each item with the target in sequence.","It stops successfully when a match is found or unsuccessfully when every item has been checked.","The method works with sorted or unsorted data and is simple to implement.","For a list of n items it may require n comparisons in the worst case, making it inefficient for large collections.","When tracing, record the current index and comparison; do not claim the list must be sorted, which is a binary-search requirement."],
"Binary search":["Binary search requires data to be sorted before searching can begin.","It compares the target with the middle item and immediately succeeds if the values match.","If the target is smaller, the upper half is discarded; if larger, the lower half is discarded, and the process repeats.","Halving the remaining search area each step makes binary search much more efficient than linear search on large sorted lists.","The cost of sorting must be considered if data changes frequently, and incorrect use on unsorted data can miss an existing target."],
"Bubble sort":["Bubble sort makes repeated passes through a list, comparing each adjacent pair of values.","A pair is swapped when it is in the wrong order, causing larger values to move toward the end during an ascending sort.","After each complete pass, at least one value is in its final position, so later passes may ignore the sorted end.","The algorithm can stop early when a pass makes no swaps because that proves the list is sorted.","Bubble sort is easy to understand but inefficient for large lists because it performs many comparisons and swaps."],
"Merge sort":["Merge sort uses divide and conquer by repeatedly splitting a list into smaller halves until single-item lists remain.","Single-item lists are already sorted, so pairs can be merged by repeatedly choosing the smaller front item.","The merging stage continues until one complete sorted list has been reconstructed.","It is efficient and predictable for large data sets, usually requiring fewer comparisons than simple quadratic sorts.","Its disadvantage is the additional memory needed to hold temporary sub-lists during splitting and merging."],
"Insertion sort":["Insertion sort treats the first item as a sorted section and examines each following item in turn.","The current item is compared backwards with sorted values, which are shifted right until the correct position is found.","The item is inserted into the gap, enlarging the sorted section by one, and the process repeats.","It is simple and can perform well on small or nearly sorted lists because few shifts may be required.","On a reverse-ordered large list it requires many comparisons and shifts, so it is generally less efficient than merge sort."],
"Variables":["A variable is a named memory location whose stored value can change while a program executes.","A meaningful identifier such as totalScore makes code easier to understand and maintain than a vague name.","Assignment stores or replaces a value, so score = score + 1 reads the old value before writing the new one.","A variable's data type controls what values and operations are valid, such as arithmetic on integers or concatenation on strings.","Variables should be initialised before use; do not confuse assignment with an equality comparison in an algorithm."],
"Constants":["A constant is a named value that is set once and is not changed while the program executes.","Constants suit fixed values such as tax rates, maximum sizes or mathematical values used in several places.","A descriptive name explains the value's meaning and removes unexplained magic numbers from program statements.","Changing a defined constant in one place updates every use, improving maintainability and reducing inconsistency.","A constant can have any suitable data type; it is defined by being fixed, not by always storing a number."],
"Data types":["Integer stores whole numbers, while real or float stores numbers with fractional parts.","Boolean stores one of two logical values, True or False, and is commonly used in conditions and flags.","Character stores one symbol, whereas string stores a sequence of characters such as a name or postcode.","The chosen type determines memory representation, valid operations and the range or precision of possible values.","Casting converts a value between compatible types, for example turning numeric text from input into an integer before arithmetic."],
"Selection":["Selection allows a program to choose which statements execute according to a Boolean condition.","An IF branch runs when its condition is true, while ELSE provides an alternative when it is false.","ELSE IF or nested selection can distinguish several cases, but conditions should be ordered so earlier branches do not hide later ones.","Comparison operators create conditions and Boolean operators combine them, for example age >= 13 AND hasPermission.","Boundary values require careful choice of <, <=, > or >=; tracing values on either side of a boundary catches mistakes."],
"Iteration":["Iteration repeats a block of instructions and is also called looping.","A count-controlled FOR loop is appropriate when the required number of repetitions is known.","A condition-controlled WHILE loop tests before each repetition and may execute zero times if its condition starts false.","A REPEAT UNTIL loop tests after the body, so the statements execute at least once.","Every condition-controlled loop must make progress toward stopping; otherwise it becomes an infinite loop."],
"Arrays":["An array stores multiple values of the same data type under one identifier, with each element accessed using an index.","A one-dimensional array represents a list, while a two-dimensional array can represent rows and columns such as a game board.","Most programming languages use zero-based indexing, although exam pseudocode should follow the convention stated in the question.","Loops are commonly used to input, search, total or update every array element efficiently.","Accessing an index outside the defined bounds causes an error; the final index must be derived carefully from the array length."],
"Functions":["A function is a named, reusable subprogram designed to perform a specific task and return a value to its caller.","Parameters receive input values, while arguments are the actual values supplied when the function is called.","The returned result can be assigned to a variable or used directly inside a larger expression.","Functions support decomposition, reduce duplicated code and can be tested independently from the rest of a program.","A function may also contain local variables that exist only during the call; its key distinction from a procedure is returning a value."],
"Procedures":["A procedure is a named, reusable subprogram that performs a task without returning a value directly.","It may accept parameters so the same instructions can work with different input values.","Procedures are called as statements, for example displayMenu(), and may produce output or alter data available to them.","Using procedures supports decomposition, improves readability and avoids repeating identical blocks of code.","Do not say procedures cannot receive data; they can use parameters, but unlike functions they do not return a result."],
"Operators":["Arithmetic operators perform calculations, including addition, subtraction, multiplication, division, integer division and modulo.","Relational operators such as ==, !=, < and >= compare values and produce a Boolean result.","Boolean operators AND, OR and NOT combine or invert conditions to build more complex decisions.","The modulo operator returns the remainder after integer division and can test whether a number is even using number MOD 2 = 0.","Operator precedence controls evaluation order, so brackets should be used when the intended order could be unclear."],
"Defensive programming":["Defensive programming anticipates invalid input and unexpected situations so software continues safely or reports a useful error.","Input validation rejects unsuitable values before they are processed, reducing crashes and incorrect stored data.","Authentication and access controls prevent unauthorised users from reaching protected features or information.","Clear prompts, sensible defaults and confirmation before destructive actions reduce mistakes caused by users.","Maintainable code uses meaningful names, indentation, comments and modular subprograms so faults are easier to locate and correct."],
"Validation":["Validation automatically checks whether input is sensible and follows rules before a program accepts it.","Range checks enforce upper and lower limits, while type checks require a value of the expected data type.","Length checks enforce a permitted number of characters, presence checks reject empty input and format checks require a pattern.","Check digits can detect some data-entry errors in codes, while lookup checks compare input with a list of allowed values.","Validation cannot prove information is true; verification, such as double entry, checks that data was copied accurately."],
"Authentication":["Authentication is the process of checking that a user is genuinely the person or account they claim to be.","Knowledge factors include passwords, possession factors include security tokens, and biometric factors include fingerprints.","Multi-factor authentication combines different factor types, so compromising one credential is not enough for access.","Passwords should be stored as salted hashes rather than readable plaintext, limiting exposure if a database is stolen.","Authentication identifies the user, while authorisation applies permissions afterward; these terms should not be used interchangeably."],
"Testing":["Testing executes a program with planned data to find faults and check that requirements are satisfied.","Normal test data is valid and typical, boundary data lies at or immediately around allowed limits, and invalid data should be rejected.","A test plan records each test input, its reason, expected result and actual result so failures can be reproduced.","Iterative testing occurs throughout development, while final or acceptance testing checks the completed solution against requirements.","Successful tests show correct behaviour for those cases, not proof that no errors exist; failed cases should be fixed and retested."],
"Error handling":["Error handling detects exceptional situations and responds safely instead of allowing a program to terminate unexpectedly.","Examples include non-numeric input, division by zero, unavailable files or failed network connections.","A program can display a clear message, request new input, record the problem or return to a safe state.","Exception-handling structures separate normal processing from recovery code and prevent one predictable problem from crashing the application.","Error handling does not replace validation or testing; these techniques work together to create robust software."],
"AND":["AND is a Boolean operator whose output is true only when both of its inputs are true.","If either input is false, the entire AND expression is false.","AND is used when every condition must be satisfied, such as age >= 18 AND hasTicket.","Its truth-table outputs for 00, 01, 10 and 11 are 0, 0, 0 and 1 respectively.","A common mistake is treating AND like OR; translate it as ‘both conditions’ before evaluating."],
"OR":["OR is a Boolean operator whose output is true when at least one input is true.","It is false only when both inputs are false.","OR is used when either condition is sufficient, such as isAdmin OR isOwner.","Its truth-table outputs for 00, 01, 10 and 11 are 0, 1, 1 and 1 respectively.","OCR uses inclusive OR, so the output remains true when both inputs are true."],
"NOT":["NOT is a unary Boolean operator, meaning it acts on one input rather than combining two inputs.","It inverts the input: NOT true is false and NOT false is true.","NOT can express an opposite condition, such as NOT loggedIn, or invert the output of another gate.","Its truth table contains only two rows: input 0 gives output 1, and input 1 gives output 0.","In a logic diagram, a small circle commonly indicates inversion; follow brackets carefully in compound expressions."],
"Truth tables":["A truth table lists every possible combination of Boolean inputs and the corresponding output of an expression or circuit.","With n independent inputs there are 2^n rows, so two inputs require four rows and three inputs require eight.","Intermediate columns should be calculated for each gate or bracketed part before working out the final output.","Rows are normally ordered systematically in binary sequence so no input combination is omitted or duplicated.","Truth tables can prove whether two expressions are equivalent by showing identical final outputs for every possible input."],
"Logic circuits":["Logic circuits represent Boolean expressions using connected gate symbols whose signals are either 0 or 1.","AND gates require all inputs to be 1, OR gates require at least one, and NOT gates invert one signal.","The output of one gate can become the input of another, so complex circuits should be evaluated in stages from left to right.","A circuit can be converted to a Boolean expression or truth table, and an expression can be implemented as a circuit.","Brackets and connection order matter: NOT(A AND B) is different from (NOT A) AND B."],
"Translators":["A translator converts source code written by a programmer into machine code that a processor can execute.","High-level language must be translated because CPUs directly understand only binary machine instructions.","Compilers translate an entire program before execution, while interpreters translate and execute it one statement at a time.","Assemblers translate low-level assembly-language mnemonics into machine code, usually with a close one-to-one relationship.","Translator choice affects execution speed, error reporting, portability and whether source code must be supplied to users."],
"Compilers":["A compiler translates the whole source program into machine code before the resulting program is executed.","It reports errors after compilation and no executable is produced successfully until syntax errors are corrected.","The generated executable can run repeatedly without translating the source again, so execution is generally fast.","The executable is produced for a particular processor or platform and can be distributed without exposing the original source code.","Compilation may take time during development, so interpreters can provide quicker feedback while code is being written."],
"Interpreters":["An interpreter translates and executes source code one statement at a time while the program runs.","It normally stops when it reaches an error, making the location easy to identify and supporting rapid testing.","No separate machine-code executable is produced, so the interpreter and usually the source code are needed each time.","Repeated translation makes interpreted programs generally slower to execute than compiled equivalents.","Interpreters are useful during development and for portable scripts, but distribution exposes source more readily."],
"IDEs":["An integrated development environment (IDE) combines tools for writing, translating, running and debugging programs in one application.","A code editor provides features such as syntax highlighting, automatic indentation and autocomplete to reduce mistakes and improve readability.","Error diagnostics identify likely syntax problems, while run-time tools execute or translate the program.","A debugger supports breakpoints, single-step execution and variable watches so programmers can inspect changing program state.","Editors do not guarantee correct logic; programmers still need planned testing, suitable test data and careful interpretation of errors."]
};

Object.entries(NOTE_EXPANSIONS).forEach(([topic, points]) => {
if (!CONTENT[topic]) return;
CONTENT[topic].notes += `<h3>Complete Revision Points</h3><ul>${points.map(point => `<li>${point}</li>`).join("")}</ul><div class="tip">💡 Exam tip: Use precise terminology, apply it to the scenario, and explain the effect rather than giving an unsupported statement.</div><div class="danger">⚠ Common misconception: Similar terms are not interchangeable; define the named concept before comparing it with another.</div>`;
});

/* Default fallback content for any subtopic without custom entries */
function defaultContent(name){
return {
notes:`<h3>${name}</h3><p>Key OCR J277 topic. Make sure you can: define the term, give examples, and link it back to how computers work.</p>
<div class="tip">Use the flashcards and quiz below to reinforce the basics for ${name}.</div>`,
flash:[[`Define ${name}.`,`Write a clear, one-line GCSE definition of ${name}.`],
[`Give an example of ${name}.`,`A concrete real-world example helps lock this concept in.`]],
quiz:[[`Which best describes ${name}?`,["The correct concept","Unrelated concept","Random distractor","Another distractor"],0,`Revise the notes for ${name}.`]],
exam:[[2,`Define ${name}.`,`A clear one-sentence definition with example (2).`]]
};
}
function contentFor(name){ return CONTENT[name] || defaultContent(name); }

const ELI5={
"CPU":"The CPU is the computer’s team leader: it reads one instruction, works out what it means, does it, then repeats very quickly.","RAM":"RAM is a temporary desk where the computer keeps things it is using now; the desk is cleared when power goes off.","ROM":"ROM is a permanent instruction card that tells the computer how to begin when it is switched on.","Cache":"Cache is a tiny tray beside the CPU holding things it will probably need next, so it does not walk to the larger RAM desk.","Virtual memory":"When the RAM desk is full, the computer temporarily uses slower storage as overflow space.","LAN":"A LAN connects nearby computers, like all the devices inside one school.","WAN":"A WAN joins networks over long distances; the Internet is the largest example.","Encryption":"Encryption locks readable data into scrambled data, and the correct key unlocks it.","Algorithms":"An algorithm is a precise recipe: ordered steps that solve a problem.","Binary search":"Binary search is like finding a word by opening a sorted dictionary near the middle and discarding the half where it cannot be.","Linear search":"Linear search checks items one after another until it finds the target or reaches the end.","Compiler":"A compiler translates the entire program before it runs, like translating a whole book first.","Interpreter":"An interpreter translates and runs one instruction at a time, like a live translator.","Authentication":"Authentication asks you to prove you are really you before letting you in."

"RAM": [["Feature","RAM","ROM"],["Purpose","Programs and data currently in use","Start-up instructions / firmware"],["Power removed","Contents lost (volatile)","Contents retained (non-volatile)"],["Typical access","Read and write","Normally read-only"]],
"ROM": [["Feature","RAM","ROM"],["Volatility","Volatile","Non-volatile"],["Use","Working memory","Boot instructions"],["Can change?","Regularly","Not during normal use"]],
"Secondary storage":[["Feature","HDD","SSD"],["Technology","Magnetic spinning platters","Electronic flash cells"],["Speed","Slower","Faster"],["Durability","Moving parts can be damaged","No moving parts"],["Cost per GB","Usually lower","Usually higher"]],
"Optical storage":[["Feature","Magnetic","Optical","Solid state"],["Method","Magnetised platter","Laser reads pits/lands","Electronic flash cells"],["Capacity","High","Low–medium","Medium–high"],["Speed","Medium","Slow","Fast"],["Best fit","Large low-cost storage","Media distribution","Portable/mobile devices"]],
"Magnetic storage":[["Feature","Magnetic","Optical","Solid state"],["Moving parts","Yes","Disc drive","No"],["Cost","Low per GB","Low per disc","Higher per GB"],["Durability","Sensitive to shock","Can scratch","Most shock resistant"]],
"Solid state storage":[["Feature","HDD","SSD"],["Read/write speed","Lower","Higher"],["Noise/power","More","Silent / lower"],["Capacity for price","Higher","Lower"]],

"Interpreters":[["Feature","Compiler","Interpreter"],["When translated","Before running","During running"],["Distribution","Executable can hide source","Source and interpreter required"],["Debugging","Compilation feedback","Immediate line-by-line feedback"]],
"Linear search":[["Feature","Linear search","Binary search"],["Data order","Any order","Must be sorted"],["Method","Checks each item","Repeatedly halves search area"],["Large lists","Less efficient","More efficient"]],
"Binary search":[["Feature","Linear search","Binary search"],["Precondition","None","Sorted data"],["Worst approach","Every item","Repeated halving"],["Best use","Small/unsorted list","Large/sorted list"]],

function tableHTML(rows){return `<div class="compare-wrap"><table class="compare">${rows.map((r,i)=>`<tr>${r.map(c=>`<${i?'td':'th'}>${esc(c)}</${i?'td':'th'}>`).join("")}</tr>`).join("")}</table></div>`}

[6,`Discuss the importance of ${sub} in a modern computer system.`,`Level response: accurate knowledge, balanced developed points, application to a realistic context and a justified conclusion. Up to 6 marks.`]
];
const out=[seed]; for(const q of extras){if(out.length>=5)break;if(!out.some(x=>x[1]===q[1]))out.push(q)} return out;

Object.values(SPEC).forEach(topics=>Object.entries(topics).forEach(([topic,subs])=>{items.push({type:"topic",title:topic,text:subs.join(" "),view:"topic",arg:topic});subs.forEach(sub=>{const c=contentFor(sub);items.push({type:"subtopic",title:sub,text:strip(c.notes),view:"subtopic",arg:sub,tab:"notes"});c.flash.forEach(([q,a])=>items.push({type:"flashcard",title:q,text:a,view:"subtopic",arg:sub,tab:"flash"}));c.quiz.forEach(([q,opts,,e])=>items.push({type:"quiz",title:q,text:`${opts.join(" ")} ${e||""}`,view:"subtopic",arg:sub,tab:"quiz"}));c.exam.forEach(([,q,a])=>items.push({type:"exam",title:q,text:a,view:"subtopic",arg:sub,tab:"exam"}))})}));

}

<div style="margin-top:14px;display:flex;gap:10px">
<button class="btn ghost" id="skip">Skip</button>
<button class="btn" id="next" style="display:none">${i===qs.length-1?'Finish':'Next ›'}</button>
</div>`;
answered=false;
document.querySelectorAll("#choices .choice").forEach(c=>c.addEventListener("click",()=>{
if(answered) return; answered=true;
const pick = +c.dataset.i;
document.querySelectorAll(".choice").forEach(x=>x.classList.add("disabled"));
if(pick===correct){ c.classList.add("correct"); score++; addXP(10,"Correct answer"); recordActivity(sub); }
else { c.classList.add("wrong"); document.querySelector(`.choice[data-i="${correct}"]`).classList.add("correct"); }
document.getElementById("explain").innerHTML = `<div class="explain"><b>${pick===correct?'Correct!':'Not quite.'}</b> ${exp||''}</div>`;
document.getElementById("next").style.display="inline-flex";
}));
document.getElementById("skip").onclick = ()=>{ if(i<qs.length-1){i++;draw();} else finish(); };
document.getElementById("next").onclick = ()=>{ if(i<qs.length-1){i++;draw();} else finish(); };
};
const finish = ()=>{
STATE.scores[sub] = {best:Math.max((STATE.scores[sub]?.best||0),score), attempts:(STATE.scores[sub]?.attempts||0)+1, total:qs.length};
save(); checkAchievements();
el.innerHTML = `
<div style="text-align:center;padding:30px">
<div style="font-size:60px">${score===qs.length?'🏆':score>=qs.length*0.7?'🎉':'💪'}</div>
<h2>You scored ${score}/${qs.length}</h2>
<p style="color:var(--muted)">Best: ${STATE.scores[sub].best}/${qs.length} · Attempts: ${STATE.scores[sub].attempts}</p>
<div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
<button class="btn" onclick="render('subtopic','${sub.replace(/'/g,"\\'")}')">Retry</button>
<button class="btn ghost" onclick="render('topics')">Back to topics</button>
</div>
</div>`;
};
draw();
}

function renderExam(el, qs, sub){
if(!qs||!qs.length){ el.innerHTML="<p>No exam questions yet.</p>"; return; }
el.innerHTML = qs.map((q,idx)=>{
const [marks,question,model] = q;
return `<div class="exam-q" id="eq${idx}">
<span class="marks">${marks} mark${marks>1?'s':''}</span>
<div style="font-weight:600">${idx+1}. ${question}</div>
<textarea placeholder="Type your answer here..."></textarea>
<div style="margin-top:10px;display:flex;gap:10px">
<button class="btn ghost" onclick="document.getElementById('eq${idx}').classList.add('show')">Show model answer</button>
<button class="btn" onclick="(function(){const e=document.getElementById('eq${idx}');e.classList.add('show'); if(!e.dataset.x){e.dataset.x=1; (window.addXP||function(){})(25,'Exam question'); }})()">Mark complete</button>
</div>
<div class="model"><b>Model answer / mark scheme:</b>\n${model}<div class="exam-meta"><div class="exam-guide"><b>Examiner guidance</b><br>Use the command word, write one developed point per mark, and apply each point to the scenario.</div><div class="exam-guide"><b>Common mistakes</b><br>Vague statements, repeated points, missing technical vocabulary, or features with no explained effect.</div></div></div>
</div>`;
}).join("");
}
window.addXP = addXP; // expose for inline buttons

${subs.map(s=>`<div class="card topic-card" onclick="render('subtopic','${s.replace(/'/g,"\\'")}')"><h3>${s}</h3><div class="meta">${(contentFor(s).flash||[]).length} cards</div></div>`).join("")}

${subs.map(s=>`<div class="card topic-card" onclick="render('subtopic','${s.replace(/'/g,"\\'")}')"><h3>${s}</h3><div class="meta">${(contentFor(s).exam||[]).length} exam Qs</div></div>`).join("")}

VIEWS.glossary = (el, initial="")=>{
setTitle("Glossary","Key terminology for J277");
el.innerHTML = `
<input class="search" id="gsearch" placeholder="Search terms..."/>
<div class="glossary-grid" id="gg"></div>`;
const gg = document.getElementById("gg");
const draw=(filter="")=>{
const f=filter.toLowerCase();
gg.innerHTML = GLOSSARY.filter(([n,d])=>n.toLowerCase().includes(f)||d.toLowerCase().includes(f))
.sort((a,b)=>a[0].localeCompare(b[0]))
.map(([n,d])=>`<div class="term"><div class="name">${n}</div><div>${d}</div></div>`).join("") || "<p>No matches.</p>";
};
document.getElementById("gsearch").value=initial;
document.getElementById("gsearch").addEventListener("input",e=>draw(e.target.value));
draw(initial);
};

function toolPanel(title,html){return `<div class="card tool-stage"><h2 style="margin-top:0">${title}</h2>${html}</div>`}
function renderMixedSession(el,title,items,onDone){
let i=0,score=0; const draw=()=>{if(i>=items.length){if(onDone)onDone(score);el.innerHTML=toolPanel(title,`<div style="text-align:center"><div style="font-size:56px">🏆</div><h2>Session complete</h2><p>You earned ${score} points across ${items.length} activities.</p><button class="btn" onclick="render('tools')">Back to Tools</button></div>`);return}const item=items[i];let body="";
if(item.kind==="flash"){body=`<div class="flash-wrap"><div class="flashcard" id="mixCard"><div class="flashcard-inner"><div class="flashcard-face"><div><div class="q">${esc(item.sub)}</div><div class="t">${esc(item.data[0])}</div></div></div><div class="flashcard-face back"><div><div class="q">Answer</div><div class="t">${esc(item.data[1])}</div></div></div></div></div><button class="btn" id="mixNext">I reviewed this (+5)</button></div>`}
else if(item.kind==="quiz"){const [q,opts,correct,exp]=item.data;body=`<div class="quiz-q">${esc(q)}</div><div id="mixChoices">${opts.map((o,n)=>`<div class="choice" data-i="${n}">${String.fromCharCode(65+n)}. ${esc(o)}</div>`).join("")}</div><div id="mixExplain"></div><button class="btn" id="mixNext" style="display:none">Next</button>`}
else{const [marks,q,a]=item.data;body=`<div class="exam-q show"><span class="marks">${marks} marks</span><div style="font-weight:700">${esc(q)}</div><textarea placeholder="Plan your answer..."></textarea><div class="model"><b>Model answer:</b> ${esc(a)}</div></div><button class="btn" id="mixNext">Completed (+10)</button>`}
el.innerHTML=toolPanel(title,`<div class="mastery">Activity ${i+1}/${items.length} · ${esc(item.sub)}</div>${body}`);if(item.kind==="flash")document.getElementById("mixCard").onclick=e=>e.currentTarget.classList.toggle("flipped");if(item.kind==="quiz")document.querySelectorAll("#mixChoices .choice").forEach(c=>c.onclick=()=>{const right=+c.dataset.i===item.data[2];c.classList.add(right?"correct":"wrong");if(right){score+=10;addXP(10,"Challenge answer")}document.getElementById("mixExplain").innerHTML=`<div class="explain">${right?"Correct!":"Review this one."} ${esc(item.data[3]||"")}</div>`;document.getElementById("mixNext").style.display="inline-flex"});document.getElementById("mixNext").onclick=()=>{if(item.kind!=="quiz"){score+=item.kind==="exam"?10:5;addXP(item.kind==="exam"?10:5,"Revision activity")}recordActivity(item.sub);i++;draw()};};draw();
}
function mixedItems(counts={quiz:5,flash:2,exam:1}){const pool=k=>shuffle(ALL_SUBS.flatMap(sub=>(contentFor(sub)[k]||[]).map(data=>({kind:k==="exam"?"exam":k,sub,data}))));return [...pool("quiz").slice(0,counts.quiz),...pool("flash").slice(0,counts.flash),...pool("exam").slice(0,counts.exam)]}
function startSprint(el){let remaining=60,score=0,question=0,timer;const qs=shuffle(ALL_SUBS.flatMap(sub=>contentFor(sub).quiz.map(data=>({sub,data})))).slice(0,30);const draw=()=>{if(remaining<=0||question>=qs.length){clearInterval(timer);STATE.sprintScore+=score;addXP(score,"Exam Sprint");checkAchievements();el.innerHTML=toolPanel("Exam Sprint",`<div style="text-align:center"><div class="timer">TIME</div><h2>${score} points</h2><button class="btn" onclick="render('tools')">Finish</button></div>`);return}const x=qs[question];el.innerHTML=toolPanel("Exam Sprint",`<div style="display:flex;justify-content:space-between"><span class="mastery">${esc(x.sub)} · Score ${score}</span><span class="timer" id="sprintTimer">${remaining}s</span></div><div class="quiz-q">${esc(x.data[0])}</div>${x.data[1].map((o,i)=>`<div class="choice" data-i="${i}">${esc(o)}</div>`).join("")}`);document.querySelectorAll(".choice").forEach(c=>c.onclick=()=>{if(+c.dataset.i===x.data[2])score+=10;recordActivity(x.sub);question++;draw()})};draw();timer=setInterval(()=>{remaining--;const t=document.getElementById("sprintTimer");if(t)t.textContent=`${remaining}s`;if(remaining<=0)draw()},1000)}
VIEWS.tools=(el)=>{setTitle("Tools Hub","Smart mixed revision across OCR J277");el.innerHTML=`<div class="grid cols-3">
${[["▤","Random Flashcard","Draw a card from anywhere in the specification.","randomFlash"],["✎","Random Exam Question","Practise an OCR-style question from any topic.","randomExam"],["◉","Revision Roulette","Let RevisePro select your next topic.","roulette"],["⚔","Challenge Mode","A mixed session of flashcards, MCQs and exam questions.","challenge"],["☀","Daily Challenge","Your daily set: 5 MCQs, 2 cards and 1 exam question.","daily"],["⏱","Exam Sprint","Answer as many quick-fire MCQs as possible in 60 seconds.","sprint"],["⌁","Weak Topics Detector","Use quiz performance to recommend priority areas.","weak"],["▦","Progress Heatmap","See activity and mastery across all subtopics.","heatmap"],["🧒","Explain Like I’m 5","Get a clear, accurate explanation of any subtopic.","eli5"]].map(([ic,n,d,id])=>`<div class="card tool-card"><div class="tool-icon">${ic}</div><h3>${n}</h3><p>${d}</p><button class="btn ghost" data-tool="${id}">Open</button></div>`).join("")}</div><div id="toolOutput"></div>`;
const out=document.getElementById("toolOutput");document.querySelectorAll("[data-tool]").forEach(b=>b.onclick=()=>{const id=b.dataset.tool;if(id==="randomFlash"){const sub=random(ALL_SUBS),card=random(contentFor(sub).flash);out.innerHTML=toolPanel("Random Flashcard · "+esc(sub),"<div id='randomFlashSlot'></div>");renderFlash(document.getElementById("randomFlashSlot"),[card],sub)}else if(id==="randomExam"){const sub=random(ALL_SUBS);out.innerHTML=toolPanel("Random Exam Question · "+esc(sub),"<div id='randomExamSlot'></div>");renderExam(document.getElementById("randomExamSlot"),[random(contentFor(sub).exam)],sub)}else if(id==="roulette"){const sub=random(ALL_SUBS);out.innerHTML=toolPanel("Revision Roulette",`<div style="text-align:center"><div style="font-size:54px">◉</div><h2>${esc(sub)}</h2><p>${esc(TOPIC_FOR[sub])}</p><button class="btn" onclick="render('subtopic','${sub.replace(/'/g,"\\'")}')">Revise this topic</button></div>`)}else if(id==="challenge"){renderMixedSession(out,"Challenge Mode",shuffle(mixedItems({quiz:3,flash:2,exam:1})),score=>{STATE.challenges++;addXP(30+score,"Challenge complete");checkAchievements()})}else if(id==="daily"){const day=new Date().toISOString().slice(0,10);renderMixedSession(out,"Daily Challenge",shuffle(mixedItems()),score=>{if(!STATE.dailyChallenges[day]){STATE.dailyChallenges[day]=score;addXP(50,"Daily Challenge complete");checkAchievements()}})}else if(id==="sprint")startSprint(out);else if(id==="weak"){const ranked=ALL_SUBS.map(sub=>{const s=STATE.scores[sub];return {sub,pct:s?Math.round(s.best/s.total*100):-1}}).sort((a,b)=>a.pct-b.pct).slice(0,8);out.innerHTML=toolPanel("Weak Topics Detector",`<p style="color:var(--muted)">Prioritised from your best quiz scores; unattempted topics appear first.</p>${ranked.map(x=>`<div class="sub-item" onclick="render('subtopic','${x.sub.replace(/'/g,"\\'")}')"><span>${esc(x.sub)}</span><span>${x.pct<0?"Not attempted":x.pct+"%"}</span></div>`).join("")}`)}else if(id==="heatmap"){out.innerHTML=toolPanel("Progress Heatmap",`<div class="heatmap">${ALL_SUBS.map(sub=>{const s=STATE.scores[sub],pct=s?Math.round(s.best/s.total*100):0,activity=Object.values(STATE.activity).reduce((n,d)=>n+(d[sub]||0),0);return `<div class="heat-cell" style="background:color-mix(in srgb,var(--good) ${Math.max(4,pct)}%,var(--panel-2))"><b>${esc(sub)}</b><div>${pct}% quiz · ${activity} activities</div></div>`}).join("")}</div>`)}else{out.innerHTML=toolPanel("Explain Like I’m 5",`<select class="search" id="eliSelect">${ALL_SUBS.map(s=>`<option>${esc(s)}</option>`).join("")}</select><div class="explain" id="eliText">${simpleExplanation(ALL_SUBS[0])}</div>`);document.getElementById("eliSelect").onchange=e=>document.getElementById("eliText").textContent=simpleExplanation(e.target.value)}out.scrollIntoView({behavior:"smooth",block:"start"})});};

el.innerHTML = `
<div class="card" style="max-width:600px">
<h3 style="margin-top:0">Appearance</h3>
<p style="color:var(--muted);font-size:13px">Switch between dark and light themes.</p>

</div>
`;

toast("Progress reset");

};
